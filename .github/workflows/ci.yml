name: tests

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

# Cancel an in-flight run when the same branch is pushed again.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        # Floor and ceiling of the supported range (README claims 3.10+).
        python-version: ["3.10", "3.13"]

    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v7
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
          cache-dependency-path: requirements.txt

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      # Note: the tests call WorkflowEnvironment.start_local(), which downloads a
      # real Temporal dev server binary into the system temp dir on each run
      # (the SDK's download_dest_dir defaults there, so there is nothing stable
      # to cache). It costs a few seconds and needs network access on the runner.
      - name: Run tests
        env:
          PYTHONPATH: ${{ github.workspace }}
        run: pytest -q
